<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Chat Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 font-sans h-screen flex flex-col justify-between">

    <header class="bg-zinc-800 p-4 border-b border-zinc-700 shadow-md">
        <h1 class="text-xl font-bold tracking-wide text-emerald-400 flex items-center gap-2">
            <span class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></span>
            Server Local Room
        </h1>
    </header>

    <div id="chat-container" class="flex-1 p-4 overflow-y-auto space-y-3 max-w-3xl w-full mx-auto">
        <div class="bg-zinc-800 border border-zinc-700 p-3 rounded-lg text-sm text-zinc-400 italic">
            Sistem: Berhasil terhubung ke jaringan lokal. Silakan mulai mengetik...
        </div>
    </div>

    <footer class="bg-zinc-800 p-4 border-t border-zinc-700 shadow-lg">
        <div class="max-w-3xl w-full mx-auto flex gap-3">
            <input type="text" id="message-input" placeholder="Tulis pesan" 
                   class="flex-1 bg-zinc-900 border border-zinc-600 rounded-lg px-4 py-3 text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-emerald-500 transition-all">
            <button onclick="sendMessage()" 
                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold px-10 py-3 rounded-lg transition-all active:scale-95 shadow-md">
                Kirim
            </button>
            
        </div>
    </footer>

    <script>
        // Konek langsung ke server FastAPI yang tadi lo nyalain
      // window.location.host bakal otomatis nyesuaiin pakai IP laptop lo nanti
const ws = new WebSocket("ws://" + window.location.host + "/ws");
        const chatContainer = document.getElementById("chat-container");
        const messageInput = document.getElementById("message-input");

        // Ketika ada pesan masuk dari server
        ws.onmessage = function(event) {
            const messageWrapper = document.createElement("div");
            messageWrapper.className = "bg-zinc-800 border border-zinc-700 px-4 py-3 rounded-xl max-w-xs md:max-w-md w-fit text-sm shadow-sm";
            messageWrapper.innerText = event.data;
            
            chatContainer.appendChild(messageWrapper);
            // Auto scroll ke bawah pas ada chat baru
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        // Fungsi buat ngirim pesan
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                ws.send(text); // Kirim teks mentah ke WebSocket server
                messageInput.value = ""; // Kosongkan input setelah kirim
            }
        }

        // Biar bisa kirim pakai tombol Enter di keyboard
        messageInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
